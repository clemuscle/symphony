image: python:3.12-slim

stages:
  - test
  - build
  - deploy
  - register

variables:
  SYMPHONY_GIT_URL: "{{.GitServerURL}}"
  SYMPHONY_CONFIG_REPO: "{{.ConfigRepoPath}}"
  APP_PORT: "{{.Port}}"

# ── TEST — tout push, toute branche, toute MR ────────
test:
  stage: test
  script:
    - pip install -r requirements.txt && pytest
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ── BUILD — push vers main uniquement ─────────────────
build:
  stage: build
  image: docker:24
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA .
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA $CI_REGISTRY_IMAGE:latest
    - docker push $CI_REGISTRY_IMAGE:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'

# ── DEPLOY production — déclenché par Symphony ou manuellement ──
deploy:
  stage: deploy
  image: docker:24
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker pull $CI_REGISTRY_IMAGE:latest
    - docker stop {{.ServiceName}} || true
    - docker rm {{.ServiceName}} || true
    - docker run -d -p $APP_PORT:$APP_PORT
        --name {{.ServiceName}}
        --restart unless-stopped
        $CI_REGISTRY_IMAGE:latest
  tags:
    - docker
  rules:
    - if: '($CI_PIPELINE_SOURCE == "api" || $CI_PIPELINE_SOURCE == "trigger") && $RECETTE_NAME == null && $DESTROY_RECETTE == null && $DESTROY_DEPLOY == null'
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'
      when: manual
      allow_failure: true

# ── DEPLOY-RECETTE — déclenché avec RECETTE_NAME ──────
deploy-recette:
  stage: deploy
  image: docker:24
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker pull $CI_REGISTRY_IMAGE:latest
    - docker stop $RECETTE_NAME || true
    - docker rm $RECETTE_NAME || true
    - docker run -d
        --name $RECETTE_NAME
        -p $RECETTE_PORT:$APP_PORT
        --restart unless-stopped
        $CI_REGISTRY_IMAGE:latest
  tags:
    - docker
  rules:
    - if: '$RECETTE_NAME'

# ── DESTROY-RECETTE ───────────────────────────────────
destroy-recette:
  stage: deploy
  image: docker:24
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker stop $DESTROY_RECETTE || true
    - docker rm $DESTROY_RECETTE || true
  tags:
    - docker
  rules:
    - if: '$DESTROY_RECETTE'

# ── DESTROY-DEPLOY ────────────────────────────────────
destroy-deploy:
  stage: deploy
  image: docker:24
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker stop {{.ServiceName}} || true
    - docker rm {{.ServiceName}} || true
  tags:
    - docker
  rules:
    - if: '$DESTROY_DEPLOY'

# ── REGISTER — après build sur main ───────────────────
register-service:
  stage: register
  image: alpine:latest
  before_script:
    - apk add --no-cache curl git
    - git config --global user.email "symphony-bot@symphony"
    - git config --global user.name "Symphony Bot"
  script:
    - export SYMPHONY_GIT_HOST=$(echo $SYMPHONY_GIT_URL | sed -E 's#^[a-z]+://##')
    - export SYMPHONY_GIT_SCHEME=$(echo $SYMPHONY_GIT_URL | sed -E 's#^([a-z]+)://.*#\1#')
    - git clone "${SYMPHONY_GIT_SCHEME}://oauth2:${SYMPHONY_TOKEN}@${SYMPHONY_GIT_HOST}/${SYMPHONY_CONFIG_REPO}.git" /tmp/symphony-config
    - cd /tmp/symphony-config
    - mkdir -p services
    - "echo 'apiVersion: symphony/v1' > services/{{.ServiceName}}.yaml"
    - "echo 'kind: Service' >> services/{{.ServiceName}}.yaml"
    - "echo 'metadata:' >> services/{{.ServiceName}}.yaml"
    - "echo '  name: {{.ServiceName}}' >> services/{{.ServiceName}}.yaml"
    - "echo \"  owner: ${GITLAB_USER_LOGIN:-symphony-bot}\" >> services/{{.ServiceName}}.yaml"
    - "echo '  tags:' >> services/{{.ServiceName}}.yaml"
    - "echo '    - {{.Language}}' >> services/{{.ServiceName}}.yaml"
    - "echo '    - auto-registered' >> services/{{.ServiceName}}.yaml"
    - "echo 'spec:' >> services/{{.ServiceName}}.yaml"
    - "echo '  type: {{.Type}}' >> services/{{.ServiceName}}.yaml"
    - "echo '  links:' >> services/{{.ServiceName}}.yaml"
    - "echo '  - title: Repository' >> services/{{.ServiceName}}.yaml"
    - "echo \"    url: $CI_PROJECT_URL\" >> services/{{.ServiceName}}.yaml"
    - "echo '  - title: Registry' >> services/{{.ServiceName}}.yaml"
    - "echo \"    url: $CI_REGISTRY_IMAGE\" >> services/{{.ServiceName}}.yaml"
    - "echo '  - title: Pipelines' >> services/{{.ServiceName}}.yaml"
    - "echo \"    url: $CI_PROJECT_URL/-/pipelines\" >> services/{{.ServiceName}}.yaml"
    - git add services/{{.ServiceName}}.yaml
    - "git diff --staged --quiet && echo 'Pas de changement' || git commit -m 'feat: register {{.ServiceName}} [symphony-bot]'"
    - git push
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'
      when: on_success
  allow_failure: true
