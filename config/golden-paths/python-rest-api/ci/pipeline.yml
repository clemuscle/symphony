image: python:3.12-slim

stages:
  - test
  - build
  - deploy
  - register

variables:
  SYMPHONY_GIT_URL: "{{.GitServerURL}}"
  SYMPHONY_CONFIG_REPO: "{{.ConfigRepoPath}}"
  APP_PORT: "{{.Port}}"

# ── TEST ──────────────────────────────────────────
test:
  stage: test
  script:
    - pip install -r requirements.txt && pytest
  only:
    - merge_requests
    - main

# ── BUILD (shared runners GitLab.com) ────────────
build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: tcp://docker:2375
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA .
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA $CI_REGISTRY_IMAGE:latest
    - docker push $CI_REGISTRY_IMAGE:latest
  only:
    - main

# ── DEPLOY (runner local avec tag docker) ─────────
deploy:
  stage: deploy
  image: docker:24
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker pull $CI_REGISTRY_IMAGE:latest
    - docker stop {{.ServiceName}} || true
    - docker rm {{.ServiceName}} || true
    - docker run -d -p $APP_PORT:$APP_PORT
        --name {{.ServiceName}}
        --restart unless-stopped
        $CI_REGISTRY_IMAGE:latest
  tags:
    - docker
  only:
    - main
  except:
    variables:
      - $RECETTE_NAME
      - $DESTROY_RECETTE
      - $DESTROY_DEPLOY

# ── DESTROY-RECETTE ───────────────────────────────
destroy-recette:
  stage: deploy
  image: docker:24
  script:
    - docker stop $DESTROY_RECETTE || true
    - docker rm $DESTROY_RECETTE || true
  tags:
    - docker
  only:
    variables:
      - $DESTROY_RECETTE

# ── DESTROY-DEPLOY ────────────────────────────────
destroy-deploy:
  stage: deploy
  image: docker:24
  script:
    - docker stop {{.ServiceName}} || true
    - docker rm {{.ServiceName}} || true
  tags:
    - docker
  only:
    variables:
      - $DESTROY_DEPLOY

# ── DEPLOY-RECETTE ────────────────────────────────
deploy-recette:
  stage: deploy
  image: docker:24
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker pull $CI_REGISTRY_IMAGE:latest
    - docker stop $RECETTE_NAME || true
    - docker rm $RECETTE_NAME || true
    - docker run -d
        --name $RECETTE_NAME
        -p $RECETTE_PORT:$APP_PORT
        --restart unless-stopped
        $CI_REGISTRY_IMAGE:latest
  tags:
    - docker
  only:
    variables:
      - $RECETTE_NAME

# ── REGISTER — Feedback GitOps vers Symphony ──────
register-service:
  stage: register
  image: alpine:latest
  before_script:
    - apk add --no-cache curl git
    - git config --global user.email "symphony-bot@symphony"
    - git config --global user.name "Symphony Bot"
  script:
    - export SYMPHONY_GIT_HOST=$(echo $SYMPHONY_GIT_URL | sed -E 's#^[a-z]+://##')
    - export SYMPHONY_GIT_SCHEME=$(echo $SYMPHONY_GIT_URL | sed -E 's#^([a-z]+)://.*#\1#')
    - git clone "${SYMPHONY_GIT_SCHEME}://oauth2:${SYMPHONY_TOKEN}@${SYMPHONY_GIT_HOST}/${SYMPHONY_CONFIG_REPO}.git" /tmp/symphony-config
    - cd /tmp/symphony-config
    - mkdir -p services
    - echo 'apiVersion: symphony/v1' > services/{{.ServiceName}}.yaml
    - echo 'kind: Service' >> services/{{.ServiceName}}.yaml
    - echo 'metadata:' >> services/{{.ServiceName}}.yaml
    - echo "  name: \"{{.ServiceName}}\"" >> services/{{.ServiceName}}.yaml
    - echo "  owner: \"${GITLAB_USER_LOGIN:-symphony-bot}\"" >> services/{{.ServiceName}}.yaml
    - echo "  tags: [{{.Language}}, auto-registered]" >> services/{{.ServiceName}}.yaml
    - echo 'spec:' >> services/{{.ServiceName}}.yaml
    - echo "  type: \"{{.Type}}\"" >> services/{{.ServiceName}}.yaml
    - echo '  links:' >> services/{{.ServiceName}}.yaml
    - echo "  - {title: Repository, url: \"$CI_PROJECT_URL\"}" >> services/{{.ServiceName}}.yaml
    - echo "  - {title: Registry, url: \"$CI_REGISTRY_IMAGE\"}" >> services/{{.ServiceName}}.yaml
    - echo "  - {title: Pipelines, url: \"$CI_PROJECT_URL/-/pipelines\"}" >> services/{{.ServiceName}}.yaml
    - git add services/{{.ServiceName}}.yaml
    - git diff --staged --quiet && echo "Pas de changement" || git commit -m "feat: register {{.ServiceName}} [symphony-bot]"
    - git push
  only:
    - main
  allow_failure: true
