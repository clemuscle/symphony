roles:
  admin:
    # OIDC groups whose members receive the 'admin' role.
    # Admins can configure Symphony (setup wizard, config reload, template reload)
    # and do everything developers can.
    # If empty, nobody is admin — SYMPHONY_DEV_MODE=1 bypasses this for local dev.
    groups:
      - devops-team
      - platform-admins

  developer:
    # OIDC groups whose members receive the 'developer' role.
    # Developers can create projects, trigger pipelines, and deploy to staging.
    # If this list is empty, every authenticated user is treated as a developer
    # (permissive default for small teams that don't need RBAC yet).
    groups:
      - developers
      - backend
      - frontend

  # viewer is the implicit default for any authenticated user not matched above.
  # Viewers have read-only access to all resources.
