integrations:
  source_code:
    provider: gitlab
    config:
      url: http://gitlab.local:8929
      # token chargé depuis env GITLAB_TOKEN

  ci_automation:
    provider: gitlab_ci
    config:
      url: http://gitlab.local:8929
      # même instance GitLab, même token

  artifact_storage:
    provider: gitlab_registry
    config:
      url: gitlab.local:5050
      # registry Docker intégré GitLab

  deployment:
    provider: docker_local
    config:
      socket: /var/run/docker.sock
