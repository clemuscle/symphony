# Symphony — environnement de démo complet
#
# Usage :
#   make demo-up   # prérequis + démarre postgres/gitlab/runner, attend que GitLab soit prêt
#   Puis suivre DEMO.md : connexion GitLab, création des tokens, wizard
#   Symphony (http://localhost:8090), jusqu'à un premier déploiement local.
#
# Prérequis : docker, docker compose v2, go, node/npm (voir DEMO.md et
# scripts/demo-up.sh, qui les vérifient).
# GitLab CE prend ~3-5 min à démarrer au premier lancement.

services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: symphony
      POSTGRES_PASSWORD: symphony123
      POSTGRES_DB: symphony
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U symphony"]
      interval: 5s
      timeout: 3s
      retries: 10

  gitlab:
    image: gitlab/gitlab-ce:17.4.0-ce.0
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://localhost:8929'
        gitlab_rails['gitlab_shell_ssh_port'] = 2224
        gitlab_rails['initial_root_password'] = 'SymphonyDemo2024!'
        # Container Registry — nécessaire pour le stage build (docker push) des golden paths
        registry_external_url 'http://localhost:5050'
        # Auto DevOps désactivé — collisionne avec le .gitlab-ci.yml du golden path
        # (job "build" dupliqué + scans SAST/container non pertinents pour la démo).
        # Cette ligne seule ne suffit pas : elle ne seed pas fiablement le
        # réglage en base sur un volume neuf — scripts/demo-up.sh le force
        # explicitement après le démarrage de GitLab, c'est la source de
        # vérité réelle.
        gitlab_rails['auto_devops_enabled'] = false
        # Performances réduites pour laptop / VM de démo
        puma['worker_processes'] = 2
        sidekiq['concurrency'] = 5
        # Monitoring non nécessaire pour la démo
        prometheus_monitoring['enable'] = false
        alertmanager['enable'] = false
        node_exporter['enable'] = false
        redis_exporter['enable'] = false
        postgres_exporter['enable'] = false
        pgbouncer_exporter['enable'] = false
    ports:
      - "8929:8929"
      - "2224:22"
      - "5050:5050"
    volumes:
      - gitlab_config:/etc/gitlab
      - gitlab_logs:/var/log/gitlab
      - gitlab_data:/var/opt/gitlab
    shm_size: '256m'
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8929/users/sign_in"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 180s

  gitlab-runner:
    image: gitlab/gitlab-runner:alpine
    depends_on:
      gitlab:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - gitlab_runner_config:/etc/gitlab-runner
    restart: unless-stopped

volumes:
  postgres_data:
  gitlab_config:
  gitlab_logs:
  gitlab_data:
  gitlab_runner_config:
